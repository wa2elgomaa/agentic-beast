version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: beast-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  redis:
    image: redis:7-alpine
    container_name: beast-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--auth", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  mongodb:
    image: mongo:7.0
    container_name: beast-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  mysql:
    image: mysql:8.0
    container_name: beast-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: beast-es01
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - beast-network

  prometheus:
    image: prom/prometheus:latest
    container_name: beast-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - beast-network

  grafana:
    image: grafana/grafana:latest
    container_name: beast-grafana
    ports:
      - "3001:3001"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - beast-network
    depends_on:
      - prometheus

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beast-app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/articles_db
      ENVIRONMENT: ${ENVIRONMENT}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_AGENT_ID: ${OPENAI_AGENT_ID:-}
      OPENAI_WORKFLOW_ID: ${OPENAI_WORKFLOW_ID:-}
      AGENT_SESSION_ENCRYPTION_KEY: ${AGENT_SESSION_ENCRYPTION_KEY:-}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./backend:/app
      - ./backend/watched_documents:/app/watched_documents
    depends_on:
      - postgres
      - redis
      - mongodb
    networks:
      - beast-network
    command: uvicorn src.app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000} --reload 

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beast-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app
    networks:
      - beast-network

  ragflow-server:
    image: "infiniflow/ragflow"
    platform: linux/amd64
    container_name: ragflow-server
    ports:
      - "8090:8080"
    environment:
      - RAGFLOW_ADMIN_PASSWORD=${RAGFLOW_ADMIN_PASSWORD}
      - DB_TYPE=mysql
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DB=${MYSQL_DATABASE}
      - MINIO_ENABLED=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      - ELASTICSEARCH_URL=http://es01:9200
      - ELASTICSEARCH_ENABLED=true
      - CHUNK_SEARCHABLE=true
    volumes:
      - ./backend/ragflow/data:/var/lib/ragflow/data
    depends_on:
      - mysql
      - redis
      - es01
    networks:
      - beast-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  ragflow-runner:
    build:
      context: ./backend
      dockerfile: ragflow/runner/Dockerfile
    container_name: ragflow-runner
    volumes:
      - ./backend/data/analytics:/app/data/analytics
      - ./backend/data/processed:/app/data/processed
      - ./backend/data/materialized:/app/data/materialized
      - ./backend/data/vector_db:/app/data/vector_db
      - ./backend:/app
    environment:
      - PYTHONPATH=/app
    restart: "unless-stopped"

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  mysql_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  beast-network:
    driver: bridge
