  model-downloader:
    image: python:3.11-slim
    container_name: beast-model-downloader
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
    volumes:
      - models_data:/models
      - ./backend/scripts/download_model.py:/app/download_model.py
    command: >-
      /bin/sh -c "pip install --no-cache-dir huggingface-hub && python /app/download_model.py"
    networks:
      - beast-network
    restart: "no"

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beast-app
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-beastredis}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-beastredis}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-beastredis}@redis:6379/2
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/articles_db
      ENVIRONMENT: ${ENVIRONMENT}
      DOCKER_MODEL_RUNNER_ENABLED: ${DOCKER_MODEL_RUNNER_ENABLED:-false}
      DOCKER_MODEL_RUNNER_BASE_URL: ${DOCKER_MODEL_RUNNER_BASE_URL:-http://model-runner.docker.internal/engines/v1}
      AGENT_SESSION_ENCRYPTION_KEY: ${AGENT_SESSION_ENCRYPTION_KEY:-}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./backend:/app
      - ./backend/watched_documents:/app/watched_documents
      - models_data:/models
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      # ollama:
      #   condition: service_started
      model-downloader:
        condition: service_completed_successfully
    networks:
      - beast-network
    command: uvicorn src.app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000} --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beast-celery-worker
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-beastredis}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-beastredis}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-beastredis}@redis:6379/2
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/articles_db
      ENVIRONMENT: ${ENVIRONMENT}
      DOCKER_MODEL_RUNNER_ENABLED: ${DOCKER_MODEL_RUNNER_ENABLED:-false}
      DOCKER_MODEL_RUNNER_BASE_URL: ${DOCKER_MODEL_RUNNER_BASE_URL:-http://model-runner.docker.internal/engines/v1}
      AGENT_SESSION_ENCRYPTION_KEY: ${AGENT_SESSION_ENCRYPTION_KEY:-}
    volumes:
      - ./backend:/app
      - ./backend/watched_documents:/app/watched_documents
      - models_data:/models
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      # ollama:
      #   condition: service_started
      model-downloader:
        condition: service_completed_successfully
    networks:
      - beast-network
    healthcheck:
      disable: true
    restart: unless-stopped
    command: celery -A app.tasks.celery_app:celery_app worker -l info --pool=solo --concurrency=1

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beast-celery-beat
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-beastredis}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-beastredis}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-beastredis}@redis:6379/2
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/articles_db
      ENVIRONMENT: ${ENVIRONMENT}
      DOCKER_MODEL_RUNNER_ENABLED: ${DOCKER_MODEL_RUNNER_ENABLED:-false}
      DOCKER_MODEL_RUNNER_BASE_URL: ${DOCKER_MODEL_RUNNER_BASE_URL:-http://model-runner.docker.internal/engines/v1}
      AGENT_SESSION_ENCRYPTION_KEY: ${AGENT_SESSION_ENCRYPTION_KEY:-}
    volumes:
      - ./backend:/app
      - ./backend/watched_documents:/app/watched_documents
      - models_data:/models
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      # ollama:
      #   condition: service_started
      model-downloader:
        condition: service_completed_successfully
    networks:
      - beast-network
    healthcheck:
      disable: true
    restart: unless-stopped
    command: celery -A app.tasks.celery_app:celery_app beat -l info --pidfile=/tmp/celerybeat.pid

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beast-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}
    depends_on:
      - app
    networks:
      - beast-network

