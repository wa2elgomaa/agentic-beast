version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: beast-postgres
    environment:
      POSTGRES_USER: beast
      POSTGRES_PASSWORD: beast
      POSTGRES_DB: beast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beast -d beast"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  redis:
    image: redis:7-alpine
    container_name: beast-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  mongodb:
    image: mongo:7.0
    container_name: beast-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  prometheus:
    image: prom/prometheus:latest
    container_name: beast-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - beast-network

  grafana:
    image: grafana/grafana:latest
    container_name: beast-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - beast-network
    depends_on:
      - prometheus

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beast-app
    environment:
      DATABASE_URL: postgresql+asyncpg://beast:beast@postgres:5432/beast
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MONGODB_URI: mongodb://admin:admin@mongodb:27017/articles_db
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./watched_documents:/app/watched_documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - beast-network
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  beast-network:
    driver: bridge
