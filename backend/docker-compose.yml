version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: beast-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  redis:
    image: redis:7-alpine
    container_name: beast-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  mongodb:
    image: mongo:7.0
    container_name: beast-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beast-network

  prometheus:
    image: prom/prometheus:latest
    container_name: beast-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - beast-network

  grafana:
    image: grafana/grafana:latest
    container_name: beast-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - beast-network
    depends_on:
      - prometheus

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beast-app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/articles_db
      ENVIRONMENT: ${ENVIRONMENT}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./watched_documents:/app/watched_documents
    depends_on:
      - postgres
      - redis
      - mongodb
    networks:
      - beast-network
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload
  ragflow-server:
    image: "infiniflow/ragflow"   # replace with official RagFlow server image / tag
    platform: linux/amd64
    container_name: ragflow-server
    ports:
      - "8090:8080"   # adjust if RagFlow uses a different port
    environment:
      - RAGFLOW_ADMIN_PASSWORD=${RAGFLOW_ADMIN_PASSWORD}
      # Add other RagFlow required envs here (DB, Redis, etc.) per RagFlow docs
    volumes:
      - ./ragflow/data:/var/lib/ragflow/data  # persist server state if needed
    restart: unless-stopped
  ragflow-runner:
    build:
      context: .
      dockerfile: ragflow/runner/Dockerfile
    container_name: ragflow-runner
    volumes:
      - ./data/analytics:/app/data/analytics         # mount your Excel input dir
      - ./data/processed:/app/data/processed   # mount processed output
      - ./data/materialized:/app/data/materialized
      - ./data/vector_db:/app/data/vector_db   # vector db persistence (Chroma/FAISS storage)
      - ./:/app                                # mount repo (scripts, ragflow/pipelines)
    environment:
      - PYTHONPATH=/app
    # Runner typically shouldn't expose ports. RagFlow will call it (or runner polls).
    restart: "unless-stopped"
volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  beast-network:
    driver: bridge
